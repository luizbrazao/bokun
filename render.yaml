# render.yaml
# Render Blueprint — deploys both services from a single git push.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Node.js Backend (Web Service) ─────────────────────────────
  - type: web
    name: bokun-bot-api
    runtime: node
    plan: starter
    region: frankfurt
    rootDir: .
    buildCommand: npm install
    preDeployCommand: npm run convex:deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: BOKUN_BASE_URL
        value: https://api.bokun.io
      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # Secrets
      - key: CONVEX_URL
        sync: false
      - key: CONVEX_SITE_URL
        sync: false
      - key: CONVEX_DEPLOY_KEY
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: BOKUN_APP_CLIENT_ID
        sync: false
      - key: BOKUN_APP_CLIENT_SECRET
        sync: false
      - key: BOKUN_OAUTH_REDIRECT_URI
        sync: false
      - key: BOKUN_ACCESS_KEY
        sync: false
      - key: BOKUN_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  # ── React Dashboard (Static Site) ─────────────────────────────
  - type: web
    name: bokun-bot-dashboard
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CONVEX_URL
        sync: false